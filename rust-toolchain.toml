# Pinned for reproducibility. Nightly is no longer REQUIRED: the spec is generated by a plain
# build.rs (not the old crabtime proc-macro), so any Rust >= 1.85 (for edition 2024) would build
# this. Pinned to this nightly only because it is the toolchain installed on the dev machine; bump
# deliberately, don't let it drift.
[toolchain]
channel = "nightly-2026-07-05"
components = ["rustfmt", "clippy"]
