<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cascade Typeset</title>
<!-- Favicon: the neutral mark (no accent, per brand rule 1). Follows the OS scheme —
     it lives in the browser tab chrome, not the page, so it tracks the system, not the
     in-page theme toggle. -->
<link rel="icon" href="site/assets/favicon/cascade-favicon-light.svg" media="(prefers-color-scheme: light)">
<link rel="icon" href="site/assets/favicon/cascade-favicon-dark.svg" media="(prefers-color-scheme: dark)">
<!-- The document's color tokens (--ct-*), single-sourced from tools/tokens.mjs via
     `just gen`. The chrome reuses --ct-bg (iframe ground) and --ct-accent (focus ring)
     straight from here — no copies — and they flip on the same [data-theme] the
     --ui-* chrome palette uses. -->
<link rel="stylesheet" href="cascade-css/theme.css">
<style>
  /* color-scheme stays declared so native controls + scrollbars render for both
     themes — but the chrome palette is driven by [data-theme] on <html>, not by it. */
  :root {
    color-scheme: light dark;
    /* Chrome palette — warm-neutral, so the frame recedes behind the warm document
       instead of framing it in cold white. Viewer-only (not part of the cascade
       library). Light values (also the default); [data-theme="dark"] overrides below.
       The document's --ct-bg / --ct-accent come from the linked theme.css above. */
    --ui-bg: #EDEAE3; --ui-fg: #2A2723; --ui-bg-panel: #F6F2E9;
    --ui-border: #C9C3B8; --ui-border-strong: #9A9388; --ui-shadow: #2A272340;
  }
  [data-theme="dark"] {
    --ui-bg: #100E0B; --ui-fg: #DDD8CF; --ui-bg-panel: #1A1713;
    --ui-border: #3D3830; --ui-border-strong: #565046; --ui-shadow: #00000080;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body { display: flex; flex-direction: column; font: 14px/1.4 system-ui, sans-serif; background: var(--ui-bg); color: var(--ui-fg); }
  header {
    flex: none; display: flex; align-items: center; gap: 0.6rem;
    padding: 0.6rem 1rem; border-bottom: 1px solid var(--ui-border);
    background: var(--ui-bg); color: var(--ui-fg);
  }
  .name { font-weight: 600; letter-spacing: -0.01em; margin-right: auto; }
  .name small { font-weight: 400; opacity: 0.55; }

  /* Options dropdown (drives the CSS sample) */
  .menu { position: relative; }
  .menu[hidden] { display: none; }
  .menu > summary {
    list-style: none; cursor: pointer; user-select: none;
    padding: 0.35rem 0.9rem; border: 1px solid var(--ui-border-strong); border-radius: 6px;
  }
  .menu > summary::-webkit-details-marker { display: none; }
  .menu > summary::after { content: " ▾"; opacity: 0.6; }
  .menu[open] > summary { background: var(--ui-fg); color: var(--ui-bg-panel); border-color: var(--ui-fg); }
  .menu .panel {
    position: absolute; right: 0; top: calc(100% + 0.4rem); z-index: 10;
    display: grid; gap: 0.45rem; padding: 0.7rem; min-width: 15rem;
    background: var(--ui-bg-panel); color: var(--ui-fg);
    border: 1px solid var(--ui-border-strong); border-radius: 8px; box-shadow: 0 8px 24px var(--ui-shadow);
  }
  .panel label { display: grid; grid-template-columns: 4rem 1fr; align-items: center; gap: 0.5rem; }
  .panel select { font: inherit; }

  .tabs { display: flex; gap: 0.4rem; }
  .tab {
    appearance: none; cursor: pointer; font: inherit;
    padding: 0.35rem 0.9rem; border-radius: 6px;
    border: 1px solid var(--ui-border-strong); background: transparent; color: inherit;
  }
  .tab[aria-selected="true"] { background: var(--ui-fg); color: var(--ui-bg-panel); border-color: var(--ui-fg); }

  /* Compile button — replaces the Options menu on the Typst tab */
  .compile {
    appearance: none; cursor: pointer; font: inherit;
    padding: 0.35rem 0.9rem; border-radius: 6px;
    border: 1px solid var(--ui-border-strong); background: transparent; color: inherit;
  }
  .compile[hidden] { display: none; }
  .compile:not(:disabled):hover { border-color: var(--ui-fg); }
  .compile:disabled { opacity: 0.45; cursor: default; }

  /* Sun/moon light–dark toggle (far right) */
  .theme-toggle {
    appearance: none; cursor: pointer; display: grid; place-items: center;
    inline-size: 2rem; block-size: 2rem; padding: 0; margin-left: 0.1rem;
    border: 1px solid var(--ui-border-strong); border-radius: 6px; background: transparent; color: inherit;
  }
  .theme-toggle:hover { border-color: var(--ui-fg); }
  .theme-toggle svg { inline-size: 1.15rem; block-size: 1.15rem; display: block; }

  /* Focus ring — the one intentional break from neutrality: the brand accent, so
     focus is unmistakable and never reads as hover or selection. */
  .menu > summary:focus-visible,
  .tab:focus-visible,
  .compile:focus-visible,
  .theme-toggle:focus-visible { outline: 2px solid var(--ct-accent); outline-offset: 2px; }

  iframe { flex: 1; width: 100%; border: 0; background: var(--ct-bg); }
</style>
</head>
<body>
<header>
  <div class="name">Cascade Typeset <small>examples</small></div>

  <details class="menu" id="opts" hidden>
    <summary>Options</summary>
    <div class="panel">
      <label>scale
        <select id="sel-scale">
          <option value="scale-classical">classical</option>
          <option value="scale-golden-ratio">golden-ratio</option>
          <option value="scale-golden-ditonic" selected>golden-ditonic</option>
          <option value="scale-tritonic">tritonic</option>
          <option value="scale-tetratonic">tetratonic</option>
          <option value="scale-major-third">major-third</option>
          <option value="scale-minor-third">minor-third</option>
        </select>
      </label>
      <label>body
        <select id="sel-style">
          <option value="bundle-serif" selected>serif</option>
          <option value="bundle-sans">sans</option>
          <option value="bundle-mono">mono</option>
          <option value="bundle-lora">Lora</option>
          <option value="bundle-inter">Inter</option>
          <option value="bundle-jost">Jost</option>
        </select>
      </label>
      <label>heading
        <select id="sel-heading">
          <option value="" selected>match body</option>
          <option value="heading-serif">serif</option>
          <option value="heading-sans">sans</option>
          <option value="heading-mono">mono</option>
          <option value="heading-lora">Lora</option>
          <option value="heading-inter">Inter</option>
          <option value="heading-jost">Jost</option>
        </select>
      </label>
      <label>notes
        <select id="sel-notes">
          <option value="banded" selected>banded (Tufte)</option>
          <option value="centered">centered</option>
        </select>
      </label>
    </div>
  </details>

  <button class="compile" id="compile" type="button" hidden>Compile</button>

  <div class="tabs" role="tablist">
    <button class="tab" role="tab" data-src="cascade-css/sample.html" aria-selected="true">CSS</button>
    <button class="tab" role="tab" data-src="cascade-typst/sample.pdf" aria-selected="false">Typst (PDF)</button>
  </div>

  <button class="theme-toggle" id="theme-toggle" type="button" title="Toggle light / dark"></button>
</header>

<iframe id="view" title="example"></iframe>

<script>
  const view = document.getElementById('view');
  const tabs = [...document.querySelectorAll('.tab')];
  const opts = document.getElementById('opts');
  const sels = {
    scale:   document.getElementById('sel-scale'),
    body:    document.getElementById('sel-style'),
    heading: document.getElementById('sel-heading'),
    notes:   document.getElementById('sel-notes'),
  };
  let theme = 'light';   // set from system pref at init; toggled by the sun/moon button

  const state = () => ({
    scale: sels.scale.value, body: sels.body.value,
    heading: sels.heading.value, notes: sels.notes.value, theme,
  });
  const isCss = () => view.dataset.kind === 'css';
  const applyCss = () => { if (isCss() && view.contentWindow && view.contentWindow.setCascade) view.contentWindow.setCascade(state()); };

  const closeMenu = () => { opts.open = false; };

  // Theme drives the chrome via [data-theme] (the --ui-* palette flips from one switch).
  // color-scheme is also set so native controls + scrollbars match the active theme.
  const applyChrome = () => {
    document.documentElement.dataset.theme = theme;
    document.documentElement.style.colorScheme = theme;
  };

  // ── Compile (Typst tab): rebuild the PDF from the currently selected options ──
  const compileBtn = document.getElementById('compile');
  // What the shown PDF was compiled with. Baseline = sample.typ defaults (what
  // `just pdf` produces), which mirror the CSS defaults.
  let compiledSig = JSON.stringify({ scale: 'golden-ditonic', body: 'serif', heading: '', theme: 'light', sidenotes: 'false' });

  // CSS control values → clean Typst option names (strip the class prefixes).
  // The `notes` selector maps to the Typst edition: banded ⇒ margin notes, centered ⇒ footnotes.
  const typstOptions = () => ({
    scale:   sels.scale.value.replace('scale-', ''),
    body:    sels.body.value.replace('bundle-', ''),
    heading: sels.heading.value.replace('heading-', ''),   // '' = match body
    theme,
    sidenotes: sels.notes.value === 'banded' ? 'true' : 'false',
  });
  const updateCompile = () => {
    const dirty = JSON.stringify(typstOptions()) !== compiledSig;
    compileBtn.disabled = !dirty;
    compileBtn.title = dirty
      ? 'Recompile the Typst PDF with the current options'
      : 'PDF is up to date with the current options';
  };
  let compiling = false;
  const doCompile = async () => {
    if (compiling || compileBtn.disabled) return;
    compiling = true;
    compileBtn.disabled = true; compileBtn.textContent = 'Compiling…';
    try {
      const r = await fetch('compile', {
        method: 'POST', headers: { 'content-type': 'application/json' },
        body: JSON.stringify(typstOptions()),
      });
      if (!r.ok) throw new Error(await r.text());
      const { compiled } = await r.json();
      compiledSig = JSON.stringify(compiled);
      view.src = 'cascade-typst/sample.pdf?t=' + Date.now();   // refresh the PDF view
    } catch (e) {
      console.error('compile failed:', e);
      compileBtn.textContent = 'Error';
      setTimeout(() => { compileBtn.textContent = 'Compile'; updateCompile(); }, 1800);
      compiling = false; return;
    }
    compileBtn.textContent = 'Compile'; compiling = false; updateCompile();
  };
  compileBtn.addEventListener('click', doCompile);

  const apply = () => { applyChrome(); applyCss(); updateCompile(); };

  // Sun/moon toggle — the icon shows the CURRENT mode (sun = light, moon = dark).
  const themeBtn = document.getElementById('theme-toggle');
  const ICON = {
    light: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>',
    dark:  '<svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg>',
  };
  const setTheme = t => {
    theme = t;
    themeBtn.innerHTML = ICON[t];
    themeBtn.setAttribute('aria-label', t === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    apply();
  };
  themeBtn.addEventListener('click', () => setTheme(theme === 'dark' ? 'light' : 'dark'));

  Object.values(sels).forEach(s => s.addEventListener('change', apply));
  view.addEventListener('load', () => {
    applyCss();                              // re-apply whenever the CSS sample (re)loads
    // Clicks inside the iframe don't bubble to the parent, so close the menu from
    // within the sample document too (same-origin; guarded for the PDF tab).
    try { view.contentDocument.addEventListener('click', () => { if (opts.open) closeMenu(); }); } catch (_) {}
  });

  const show = src => {
    const css = src.endsWith('.html');
    view.dataset.kind = css ? 'css' : 'pdf';
    view.src = src;
    tabs.forEach(t => t.setAttribute('aria-selected', String(t.dataset.src === src)));
    opts.hidden = !css;
    compileBtn.hidden = css;      // Compile takes the Options slot on the Typst tab
    if (!css) { closeMenu(); updateCompile(); }
    location.hash = css ? 'css' : 'typst';
  };
  tabs.forEach(t => t.addEventListener('click', () => show(t.dataset.src)));

  // Close the dropdown on an outside click.
  document.addEventListener('click', e => { if (opts.open && !opts.contains(e.target)) closeMenu(); });

  // Default theme to the system preference, then show the initial tab.
  setTheme(matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
  show(location.hash === '#typst' ? 'cascade-typst/sample.pdf' : 'cascade-css/sample.html');
</script>
</body>
</html>
